# ESPHome secrets configuration
# Replace these values with your actual WiFi credentials

# WiFi network name (SSID) used by the controller to connect to your local WLAN.
# Example: "MyHomeWiFi"
# Note: This functionality is deactivated in the code by default. Uncomment the lines in the main firmware YAML to enable it.
wifi_ssid: ""

# WiFi password for the SSID above.
# Example: "correct-horse-battery-staple"
# Note: This functionality is deactivated in the code by default. Uncomment the lines in the main firmware YAML to enable it.
wifi_password: ""

# Optional ESPHome API encryption key for Home Assistant API communication.
# Only needed if API encryption is enabled in the main firmware YAML.
# Keep this key private and use a long random value.
api_key: ""

# Optional OTA update password.
# Only needed if OTA password protection is enabled in the main firmware YAML.
# Use a strong unique password.
ota_password: ""
