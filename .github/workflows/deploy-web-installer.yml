name: Deploy Web Installer

on:
  push:
    branches:
      - main
      - master
    paths:
      - "firmware/web-installer/**"
      - ".github/workflows/deploy-web-installer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-web-installer
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload web installer artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: firmware/web-installer

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
