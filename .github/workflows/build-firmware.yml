name: Build ESPHome Firmware

on:
  push:
    branches:
      - main
      - master
    paths:
      - "firmware/config/**/*.yaml"
      - "firmware/config/**/*.yml"
      - ".github/workflows/build-firmware.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "firmware/config/**/*.yaml"
      - "firmware/config/**/*.yml"
      - ".github/workflows/build-firmware.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional: existing release tag to upload firmware asset to (e.g. 2026.1.0)"
        required: false
        type: string
      esphome_version:
        description: "ESPHome version to use for this manual run"
        required: false
        default: "2025.12.7"
        type: string
  release:
    types:
      - published
      - released
      - edited

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  discover:
    name: Discover firmware configs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build matrix from config files
        id: discover
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          echo "Debug: repository root is $(pwd)"
          echo "Debug: listing firmware/config"
          if [ -d firmware/config ]; then
            find firmware/config -maxdepth 4 -type f | sort
          else
            echo "firmware/config directory does not exist"
          fi

          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          workspace = os.getenv("GITHUB_WORKSPACE", os.getcwd())
          os.chdir(workspace)
          print(f"Python debug: cwd={Path.cwd()}")

          config_root = Path("firmware") / "config"
          if not config_root.exists():
            print("ERROR: firmware/config does not exist in checked out workspace")
            raise SystemExit(1)

          # Discover files from git index to match exactly what Actions checked out.
          # Do not rely on git pathspec '**' semantics here; list all and filter in Python.
          list_cmd = ["git", "ls-files"]
          result = subprocess.run(list_cmd, check=True, text=True, capture_output=True)
          tracked_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]
          print(f"Python debug: git ls-files returned {len(tracked_files)} tracked files")

          configs = []
          for rel in tracked_files:
            path = Path(rel)
            rel_posix = rel.replace("\\", "/")
            if not rel_posix.startswith("firmware/config/"):
              continue
            if path.suffix.lower() not in {".yaml", ".yml"}:
              continue
            name = path.name.lower()
            # Skip secret/templates and non-firmware helper files.
            if name.startswith("secrets") or name.endswith(".example.yaml") or name.endswith(".example.yml"):
              continue

            try:
              rel_to_config = path.relative_to(config_root)
            except ValueError:
              continue

            # Expect at least: pcb_xx/<file>.yaml
            rel_parts = rel_to_config.parts
            if len(rel_parts) < 2:
              continue

            pcb_folder = rel_parts[0]
            binary_name = path.stem
            configs.append(
              {
                "config_file": rel_posix,
                "pcb_folder": pcb_folder,
                "binary_name": binary_name,
              }
            )

          # De-duplicate and keep stable order.
          seen = set()
          unique = []
          for item in sorted(configs, key=lambda x: x["config_file"]):
            key = item["config_file"]
            if key in seen:
              continue
            seen.add(key)
            unique.append(item)

          if not unique:
            print("ERROR: No buildable ESPHome config files found under firmware/config.")
            print("ERROR: Expected at least one config like firmware/config/pcb_xx/*.yaml")
            raise SystemExit(1)

          event_name = os.getenv("EVENT_NAME", "")

          def changed_files_for_event() -> set[str]:
              if event_name == "workflow_dispatch":
                  return {item["config_file"] for item in unique}

              if event_name == "pull_request":
                  base = os.getenv("BASE_SHA", "")
                  head = os.getenv("HEAD_SHA", "")
              elif event_name == "push":
                  base = os.getenv("BEFORE_SHA", "")
                  head = os.getenv("CURRENT_SHA", "")
                  # On first push of a branch, BEFORE_SHA can be all zeros.
                  if base.startswith("0000000000000000000000000000000000000000"):
                      base = ""
              else:
                  base = ""
                  head = ""

              if not base or not head:
                  return set()

              try:
                  result = subprocess.run(
                      ["git", "diff", "--name-only", base, head],
                      check=True,
                      text=True,
                      capture_output=True,
                  )
                  return {line.strip() for line in result.stdout.splitlines() if line.strip()}
              except subprocess.CalledProcessError as exc:
                  print(f"Warning: could not determine changed files via git diff: {exc}")
                  return set()

          changed_files = changed_files_for_event()
          if event_name == "workflow_dispatch":
              # Manual run: always build everything discovered.
              selected = unique
          elif changed_files:
              selected = [item for item in unique if item["config_file"] in changed_files]
          else:
              # Conservative fallback: if change detection fails, build all configs.
              selected = unique

          matrix = {"include": selected}
          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
              fh.write(f"count={len(selected)}\n")
          print(f"Python debug: wrote outputs to {out}")

          print(f"Discovered {len(unique)} firmware config(s) total.")
          print(f"Selected {len(selected)} firmware config(s) for this run.")
          print(f"Event: {event_name}")
          for item in selected:
              print(
                f"- {item['config_file']} -> "
                f"firmware/binaries/{item['pcb_folder']}/{item['binary_name']}.factory.bin + "
                f"firmware/binaries/{item['pcb_folder']}/{item['binary_name']}.ota.bin"
              )
          PY

  validate:
    name: Validate ${{ matrix.config_file }}
    needs: discover
    if: ${{ needs.discover.result == 'success' && needs.discover.outputs.count != '' && needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    env:
      ESPHOME_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.esphome_version || '2025.12.7' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESPHome
        shell: bash
        run: |
          python -m pip install --upgrade pip
          echo "Installing ESPHome ${ESPHOME_VERSION}"
          python -m pip install "esphome==${ESPHOME_VERSION}"

      - name: Create dummy secrets.yaml
        shell: bash
        run: |
          CONFIG_DIR=$(dirname "${{ matrix.config_file }}")
          cat > "${CONFIG_DIR}/secrets.yaml" <<'EOF'
          wifi_ssid: "dummy_ssid"
          wifi_password: "dummy_password"
          api_key: "0123456789abcdef0123456789abcdef"
          ota_password: "dummy_ota_password"
          EOF
          echo "Created dummy secrets.yaml in ${CONFIG_DIR}"

      - name: Validate ESPHome config
        shell: bash
        run: |
          esphome config "${{ matrix.config_file }}"

  build:
    name: Build ${{ matrix.config_file }}
    needs: [discover, validate]
    if: ${{ needs.discover.result == 'success' && needs.validate.result == 'success' && needs.discover.outputs.count != '' && needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    env:
      ESPHOME_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.esphome_version || '2025.12.7' }}
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag) || '' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESPHome
        shell: bash
        run: |
          python -m pip install --upgrade pip
          echo "Installing ESPHome ${ESPHOME_VERSION}"
          python -m pip install "esphome==${ESPHOME_VERSION}"

      - name: Create dummy secrets.yaml
        shell: bash
        run: |
          CONFIG_DIR=$(dirname "${{ matrix.config_file }}")
          cat > "${CONFIG_DIR}/secrets.yaml" <<'EOF'
          wifi_ssid: "dummy_ssid"
          wifi_password: "dummy_password"
          api_key: "0123456789abcdef0123456789abcdef"
          ota_password: "dummy_ota_password"
          EOF
          echo "Created dummy secrets.yaml in ${CONFIG_DIR}"

      - name: Compile firmware
        shell: bash
        run: |
          esphome compile "${{ matrix.config_file }}"

      - name: Collect factory and OTA binaries in firmware/binaries structure
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          config_file = Path("${{ matrix.config_file }}")
          pcb_folder = "${{ matrix.pcb_folder }}"
          binary_name = "${{ matrix.binary_name }}"
          esphome_version = os.getenv("ESPHOME_VERSION", "unknown")
          release_tag = os.getenv("RELEASE_TAG", "")

          def slug(value: str) -> str:
              return re.sub(r"[^A-Za-z0-9._-]+", "-", value.strip())

          suffix = f".esphome-{slug(esphome_version)}"
          if release_tag.strip():
              suffix += f".tag-{slug(release_tag)}"

          build_root = config_file.parent / ".esphome" / "build"
          if not build_root.exists():
              raise SystemExit(f"ESPHome build directory not found: {build_root}")

          factory_bins = sorted(build_root.rglob("firmware.factory.bin"), key=lambda p: p.stat().st_mtime, reverse=True)
          if not factory_bins:
              raise SystemExit(f"No firmware.factory.bin found under {build_root}")

          ota_bins = sorted(build_root.rglob("firmware.ota.bin"), key=lambda p: p.stat().st_mtime, reverse=True)
          if not ota_bins:
              raise SystemExit(f"No firmware.ota.bin found under {build_root}")

          factory_src = factory_bins[0]
          ota_src = ota_bins[0]
          dst_dir = Path("firmware") / "binaries" / pcb_folder
          dst_dir.mkdir(parents=True, exist_ok=True)
          factory_dst = dst_dir / f"{binary_name}{suffix}.factory.bin"
          ota_dst = dst_dir / f"{binary_name}{suffix}.ota.bin"
          factory_dst.write_bytes(factory_src.read_bytes())
          ota_dst.write_bytes(ota_src.read_bytes())

          print(f"Copied {factory_src} -> {factory_dst}")
          print(f"Copied {ota_src} -> {ota_dst}")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.pcb_folder }}-${{ matrix.binary_name }}
          path: |
            firmware/binaries/${{ matrix.pcb_folder }}/${{ matrix.binary_name }}*.factory.bin
            firmware/binaries/${{ matrix.pcb_folder }}/${{ matrix.binary_name }}*.ota.bin
          retention-days: 30

      - name: Upload release asset
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
          files: |
            firmware/binaries/${{ matrix.pcb_folder }}/${{ matrix.binary_name }}*.factory.bin
            firmware/binaries/${{ matrix.pcb_folder }}/${{ matrix.binary_name }}*.ota.bin
          fail_on_unmatched_files: true
          overwrite_files: true

  no-configs:
    name: No changed firmware config
    needs: discover
    if: ${{ needs.discover.result == 'success' && needs.discover.outputs.count != '' && needs.discover.outputs.count == '0' }}
    runs-on: ubuntu-latest
    steps:
      - name: Manual run with zero configs (fail fast)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "workflow_dispatch found 0 buildable config files under firmware/config/."
          echo "Check that the selected branch contains firmware/config/<pcb_xx>/*.yaml files."
          exit 1

      - name: Report and skip (non-manual events)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          echo "No changed ESPHome config files found for this event. Nothing to build."
